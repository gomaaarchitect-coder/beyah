<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beyah — Environmental Design Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-50: #E1F5EE;
    --teal-200: #5DCAA5;
    --teal-600: #0F6E56;
    --teal-800: #085041;
    --sand: #F7F5F0;
    --sand-dark: #EDE9E1;
    --ink: #1C1C1A;
    --ink-mid: #4A4A46;
    --ink-light: #8A8A85;
    --border: rgba(28,28,26,0.1);
    --border-strong: rgba(28,28,26,0.2);
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--ink);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .logo {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--teal-50);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 20px; height: 20px; color: var(--teal-600); }

  .brand h1 {
    font-family: 'Lora', serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .brand p {
    font-size: 11px;
    color: var(--ink-light);
    margin-top: 1px;
  }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .lang-toggle {
    display: flex;
    background: var(--sand);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
  }
  .lang-btn {
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 16px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--ink-mid);
    transition: all 0.15s;
  }
  .lang-btn.active {
    background: var(--teal-600);
    color: #fff;
  }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }

  .msg { display: flex; gap: 10px; max-width: 82%; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai   { align-self: flex-start; }

  .msg-av {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
    flex-shrink: 0; margin-top: 2px;
  }
  .msg.ai  .msg-av { background: var(--teal-50); color: var(--teal-600); font-family: 'Lora', serif; }
  .msg.user .msg-av { background: var(--sand-dark); color: var(--ink-mid); }

  .msg-bubble {
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--ink);
    border: 1px solid var(--border);
    background: #fff;
  }
  .msg.user .msg-bubble {
    background: var(--teal-600);
    color: #fff;
    border-color: var(--teal-600);
    border-radius: var(--radius) 4px var(--radius) var(--radius);
  }
  .msg.ai .msg-bubble {
    border-radius: 4px var(--radius) var(--radius) var(--radius);
  }

  /* quiz suggestion pill */
  .quiz-pill {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 14px;
    background: var(--teal-50);
    border: 1px solid rgba(15,110,86,0.2);
    border-radius: 20px;
    font-size: 12.5px;
    color: var(--teal-600);
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .quiz-pill:hover { background: #C5EBD9; }

  .typing-dots { display: inline-flex; gap: 4px; align-items: center; height: 20px; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-light);
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{ transform:scale(0.7); opacity:0.4; } 40%{ transform:scale(1); opacity:1; } }

  /* ── STARTERS ── */
  #starter-strip {
    padding: 10px 20px 12px;
    background: #fff;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .starters-label { font-size: 11px; color: var(--ink-light); margin-bottom: 8px; }
  .starters-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 12.5px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-strong);
    background: transparent;
    cursor: pointer;
    color: var(--ink-mid);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.12s;
  }
  .chip:hover { background: var(--sand-dark); color: var(--ink); }

  /* ── INPUT ── */
  #input-bar {
    display: flex;
    gap: 10px;
    padding: 12px 20px 16px;
    background: #fff;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    resize: none;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    background: var(--sand);
    min-height: 42px;
    max-height: 110px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }
  #user-input:focus { border-color: var(--teal-200); background: #fff; }

  #send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--teal-600);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }
  #send-btn:hover { opacity: 0.9; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.35; cursor: default; }
  #send-btn svg { width: 17px; height: 17px; }

  /* RTL support */
  [dir="rtl"] { font-family: 'DM Sans', sans-serif; }
  [dir="rtl"] .msg.user { flex-direction: row; }
  [dir="rtl"] .msg.user .msg-bubble { border-radius: 4px var(--radius) var(--radius) var(--radius); }
  [dir="rtl"] .msg.ai  .msg-bubble { border-radius: var(--radius) 4px var(--radius) var(--radius); }

  /* scrollbar */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="brand">
      <h1>Beyah</h1>
      <p>Environmental Design · AASTMT Architecture</p>
    </div>
  </div>
  <div class="header-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">AR</button>
    </div>
  </div>
</header>

<!-- MESSAGES -->
<div id="messages"></div>

<!-- STARTER CHIPS -->
<div id="starter-strip">
  <div class="starters-label" id="starters-label">Explore a topic →</div>
  <div class="starters-row" id="starters-row"></div>
</div>

<!-- INPUT -->
<div id="input-bar">
  <textarea id="user-input" rows="1" placeholder="Ask about any Environmental Design concept..."></textarea>
  <button id="send-btn" onclick="sendMessage()" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
// Replace with your actual proxy URL after deploying to Render
const PROXY_URL = 'https://beyah-proxy.onrender.com';
// ────────────────────────────────────────────────────────

let lang = 'en';
let history = [];
let loading = false;
let exchangeCount = 0;

// ── SYSTEM PROMPTS ───────────────────────────────────────
const SYSTEM = {
  en: `You are Beyah, a knowledgeable and warm Environmental Design tutor at AASTMT (Arab Academy for Science, Technology and Maritime Transport), Faculty of Architecture and Environmental Design, Alexandria, Egypt.

Your core teaching approach draws on established pedagogical principles — retrieval practice, elaborative interrogation, spaced concept-building, and guided discovery. You guide students to construct understanding themselves rather than receiving it passively.

TEACHING BEHAVIOR:
- Begin by exploring what the student already knows about the topic before introducing anything new.
- Ask one focused question at a time. Never pile on multiple questions.
- When a student responds, acknowledge what is correct, gently and specifically address any misconceptions, then deepen with the next question.
- Scaffold from concrete examples to abstract principles. Always ground concepts in real Alexandria / Egyptian / Mediterranean climate context where relevant.
- Use analogies to everyday experience when introducing difficult concepts.
- After 3–5 exchanges on a topic, offer a brief synthesis (3–4 sentences max), and naturally suggest a short quiz to consolidate what was just discussed. Frame it invitingly, e.g. "Want to test how well this has stuck? I can give you a quick challenge."
- During quizzing: pose one question at a time, give immediate specific feedback, and close with a short reflection on what was learned.
- Never use the words "Socratic", "pedagogy", "retrieval practice", or any meta-teaching language. Just teach naturally.

SCOPE — topics include:
Thermal comfort (PMV, adaptive model), passive cooling strategies, natural ventilation (cross, stack, single-sided), solar radiation and sun angles, shading devices (fixed vs dynamic), daylighting metrics (DF, UDI, sDA), urban heat island, bioclimatic design, building orientation, thermal mass, evaporative cooling, green roofs, wind pressure and CFD concepts, urban canyon ventilation, human thermal sensation.

TONE: Encouraging, intellectually engaged, never condescending. Like a thoughtful PhD mentor in office hours.
LANGUAGE: English. Keep responses to 3–5 sentences + your question or quiz prompt.`,

  ar: `أنتِ "بياه"، مدرّسة متمكّنة وودودة في التصميم البيئي بالأكاديمية العربية للعلوم والتكنولوجيا والنقل البحري، كلية الهندسة المعمارية والتصميم البيئي، الإسكندرية، مصر.

أسلوبك التعليمي مبني على مبادئ تربوية راسخة — الاسترجاع المعرفي، والاستجواب التفصيلي، والبناء التدريجي للمفاهيم، والاكتشاف الموجَّه. تقودين الطلاب ليبنوا فهمهم بأنفسهم بدلاً من استقباله بشكل سلبي.

سلوكك التعليمي:
- ابدأي باستكشاف ما يعرفه الطالب قبل تقديم أي معلومة جديدة.
- اسأل سؤالاً واحداً محدداً في كل مرة. لا تطرحي أسئلة متعددة دفعة واحدة.
- عندما يجيب الطالب، أقري ما هو صحيح، وعالجي المفاهيم الخاطئة بلطف وتحديد، ثم عمّقي بالسؤال التالي.
- انتقلي من الأمثلة المحسوسة إلى المبادئ المجردة. استخدمي دائماً أمثلة من الإسكندرية والمناخ المصري والمتوسطي.
- استخدمي التشبيهات من الحياة اليومية عند تقديم المفاهيم الصعبة.
- بعد 3–5 تبادلات حول موضوع ما، قدّمي ملخصاً موجزاً (3–4 جمل)، واقترحي بشكل طبيعي اختباراً قصيراً لترسيخ ما نوقش، مثلاً: "هل تودّ أن نختبر ما تعلمناه الآن؟ أستطيع أن أطرح عليكَ تحدياً سريعاً."
- أثناء الاختبار: اطرحي سؤالاً واحداً في كل مرة، وأعطي تغذية راجعة محددة وفورية، واختتمي بتأمل قصير فيما تعلّمه الطالب.
- لا تستخدمي كلمات مثل "سقراطي" أو "بيداغوجيا" أو أي لغة تربوية مباشرة. فقط علّمي بشكل طبيعي.

المواضيع: الراحة الحرارية، التبريد السلبي، التهوية الطبيعية، الإشعاع الشمسي، أجهزة التظليل، الإضاءة الطبيعية، جزيرة الحرارة الحضرية، التصميم الحيوي المناخي، توجيه المبنى، الكتلة الحرارية، التبريد التبخيري، الأسطح الخضراء، ضغط الرياح، تهوية الممرات الحضرية.

الأسلوب: مشجّع، منخرط فكرياً، غير متعالٍ. كمرشدة دكتوراه متأملة في ساعات المكتب.
اللغة: العربية. اجعلي ردودك في 3–5 جمل + سؤالك أو اختبارك.`
};

// ── CONTENT ─────────────────────────────────────────────
const STARTERS = {
  en: ['Thermal comfort','Natural ventilation','Solar angles & shading','Urban heat island','Daylighting metrics','Passive cooling','Thermal mass','Building orientation'],
  ar:  ['الراحة الحرارية','التهوية الطبيعية','زوايا الشمس والتظليل','جزيرة الحرارة الحضرية','مقاييس الإضاءة الطبيعية','التبريد السلبي','الكتلة الحرارية','توجيه المبنى']
};
const WELCOME = {
  en: "Hello — I'm Beyah, your Environmental Design tutor. Before we dive in, tell me: what brought you here today? Is there a concept from lecture you're still wrestling with, or somewhere you'd like to start fresh?",
  ar: "مرحباً — أنا بياه، مدرّستكَ في التصميم البيئي. قبل أن نبدأ، أخبرني: ما الذي جاء بكَ اليوم؟ هل هناك مفهوم من المحاضرة لا يزال يشغلكَ، أم تودّ أن نبدأ من نقطة جديدة؟"
};
const PLACEHOLDER = {
  en: 'Ask about any Environmental Design concept...',
  ar: 'اسأل عن أي مفهوم في التصميم البيئي...'
};
const STARTERS_LABEL = { en: 'Explore a topic →', ar: '← استكشف موضوعاً' };

// ── INIT ─────────────────────────────────────────────────
function init() {
  renderStarters();
  appendMsg('ai', WELCOME[lang]);
  checkProxy();
}

async function checkProxy() {
  // Enable send once proxy is reachable (or just enable immediately and let errors surface)
  document.getElementById('send-btn').disabled = false;
}

function renderStarters() {
  const row = document.getElementById('starters-row');
  row.innerHTML = STARTERS[lang].map(s =>
    `<button class="chip" onclick="useChip(this)">${s}</button>`
  ).join('');
  document.getElementById('starters-label').textContent = STARTERS_LABEL[lang];
  document.getElementById('user-input').placeholder = PLACEHOLDER[lang];
  document.getElementById('user-input').dir = lang === 'ar' ? 'rtl' : 'ltr';
}

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-ar').classList.toggle('active', l === 'ar');
  document.body.dir = l === 'ar' ? 'rtl' : 'ltr';
  renderStarters();
  history = [];
  exchangeCount = 0;
  document.getElementById('messages').innerHTML = '';
  appendMsg('ai', WELCOME[lang]);
}

function useChip(btn) {
  const inp = document.getElementById('user-input');
  inp.value = btn.textContent;
  autoResize(inp);
  sendMessage();
}

// ── MESSAGES ─────────────────────────────────────────────
function appendMsg(role, text, isTyping = false) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = 'msg-av';
  av.textContent = role === 'ai' ? 'B' : 'S';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.dir = lang === 'ar' ? 'rtl' : 'ltr';

  if (isTyping) {
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  } else {
    // Parse **bold** and detect quiz suggestion
    bubble.innerHTML = formatText(text);
  }

  div.appendChild(av);
  div.appendChild(bubble);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return bubble;
}

function formatText(text) {
  // Bold markdown
  let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Newlines
  html = html.replace(/\n/g, '<br>');
  // Detect quiz suggestion and add pill
  const quizTriggers = ['quiz', 'quick challenge', 'test how well', 'اختبار', 'تحدياً', 'نختبر'];
  const hasQuiz = quizTriggers.some(t => text.toLowerCase().includes(t.toLowerCase()));
  if (hasQuiz) {
    const label = lang === 'ar' ? '✦ نعم، هيّا نبدأ الاختبار' : '✦ Yes, let\'s do the quiz';
    html += `<br><span class="quiz-pill" onclick="triggerQuiz()">${label}</span>`;
  }
  return html;
}

function triggerQuiz() {
  const msg = lang === 'ar' ? 'نعم، أريد الاختبار' : "Yes, let's do the quiz";
  document.getElementById('user-input').value = msg;
  sendMessage();
}

// ── SEND ─────────────────────────────────────────────────
async function sendMessage() {
  if (loading) return;
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  autoResize(inp);
  appendMsg('user', text);
  history.push({ role: 'user', content: text });

  loading = true;
  document.getElementById('send-btn').disabled = true;
  const bubble = appendMsg('ai', '', true);

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM[lang],
        messages: history,
        max_tokens: 600
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const reply = data.content?.[0]?.text || (lang === 'ar' ? 'حدث خطأ.' : 'Something went wrong.');

    bubble.innerHTML = formatText(reply);
    bubble.dir = lang === 'ar' ? 'rtl' : 'ltr';
    history.push({ role: 'assistant', content: reply });
    exchangeCount++;

  } catch (e) {
    bubble.innerHTML = lang === 'ar'
      ? '⚠️ تعذّر الاتصال بالخادم. تأكّد من أن رابط الـ proxy صحيح.'
      : '⚠️ Could not reach the server. Make sure the proxy URL is set correctly.';
    console.error(e);
  }

  loading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

// ── UTILS ────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

document.getElementById('user-input').addEventListener('input', function() { autoResize(this); });
document.getElementById('user-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

init();
</script>
</body>
</html>
